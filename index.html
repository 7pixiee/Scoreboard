<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.cdnfonts.com/css/cursed-timer-ulil" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Scoreboard</title>
</head>

<body>
    <div class="container">
        <div class="team-columns">
        <div>
            <h3 id="board-title">HOME</h3>
        </div>
        
        <div class="home-score">
           <div id="home-points-text">0</div>
        </div>
         <div class="add-points-btns home-btns">
        <span id="add-one-point" onclick="addOnePoint('home')">+1</span>
        <span id="add-two-points" onclick="addTwoPoints('home')">+2</span>
        <span id="add-three-points" onclick="addThreePoints('home')">+3</span>
    </div>
        </div>
        <div class="team-columns">
        <div>
            <h3 id="board-title">GUEST</h3>
        </div>

        <div class="guest-score">
           <div id="guest-points-text">0</div>
        </div>
    <div class="add-points-btns guest-btns">
        <span id="add-one-point" onclick="addOnePoint('guest')">+1</span>
        <span id="add-two-points" onclick="addTwoPoints('guest')">+2</span>
        <span id="add-three-points" onclick="addThreePoints('guest')">+3</span>
    </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>

</html>
